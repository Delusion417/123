name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      server_ws_url:
        description: "Agent server WebSocket URL (e.g. ws://1.2.3.4:8080)"
        required: true
        default: "ws://127.0.0.1:8080"
      enroll_code:
        description: "Enrollment code (must match server AGENT_ENROLL_CODE)"
        required: true
        default: "company-enroll-2026"
      device_name:
        description: "Default device name in app"
        required: true
        default: "Company Device"
      build_type:
        description: "Build variant"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        env:
          SERVER_WS_URL: ${{ inputs.server_ws_url }}
          ENROLL_CODE: ${{ inputs.enroll_code }}
          DEVICE_NAME: ${{ inputs.device_name }}
          BUILD_TYPE: ${{ inputs.build_type }}
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            TASK=":app:assembleRelease"
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          else
            TASK=":app:assembleDebug"
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          fi

          gradle -p android "$TASK" \
            -PAGENT_SERVER_WS_URL="$SERVER_WS_URL" \
            -PAGENT_ENROLL_CODE="$ENROLL_CODE" \
            -PAGENT_DEVICE_NAME="$DEVICE_NAME"

          test -f "$APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotedroid-${{ inputs.build_type }}-apk
          path: ${{ env.APK_PATH }}

